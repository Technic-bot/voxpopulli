<!DOCTYPE html>
<html>
<head>
    <title> Poll </title>
</head>
<!link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
<link rel="stylesheet" type="text/css" href="/style.css">
<body>
    <div class="page">
        <div class="metadada">
            <h1 class="poll-title" id="poll-title"> POLL! </h1>
            <p class="poll-data" id="poll-date"> </p>
            <p class="poll-data" id="poll-end"> </p>
        </div> 
        <div class="columns">
            <div class="col">
                <p>Options</p>
                <div id="options" class="options">
                    <div data-id="Florb"> Flora </div>
                </div>
            </div>
            <div class="col">
                <p>Ballot</p>
                <div class="options" id="choices">
                    <div data-id="Traec"> Trace </div>
                </div>
            </div>
        </div>

        <div class='submit'>
            <button> Submit ballot </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
