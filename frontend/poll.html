<!DOCTYPE html>
<html>
<head>
    <title> Poll </title>
</head>
<link rel="stylesheet" type="text/css" href="styles/poll.css">
<body>
    <div class="page">
        <div class="metadada">
            <h1 class="poll-title" id="poll-title"> POLL! </h1>
            <p class="poll-data" id="poll-id"> </p>
            <p class="poll-data" id="poll-date"> </p>
            <p class="poll-data" id="poll-end"> </p>
        </div> 
        <div class="columns">
            <div class="col">
                <p>Options</p>
                <div id="options" class="options">
                </div>
            </div>
            <div class="col">
                <p>Ballot</p>
                <div class="options" id="choices">
                </div>
            </div>
        </div>

        <div id='submit-button' class='submit'>
            <button> Submit ballot </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script type="module" src="js/poll.js"></script>
</body>

</html>
